<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Дашборд — Портфолио IS1C</title>
  <meta name="description" content="Управление портфолио сотрудников — список сотрудников и ссылки">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .main-content { padding: 32px 0; flex: 1; }
    .employee-name { font-weight: 600; font-size: 0.9rem; }
    .employee-pos  { font-size: 0.78rem; color: var(--text-muted); }
    /* .link-cell теперь оформляется как ссылка в /css/styles.css */
    .toolbar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
    .toolbar-left { flex: 1; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; min-width: 0; }
    .filter-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.875rem; font-weight: 500; color: var(--text-secondary);
      cursor: pointer; white-space: nowrap;
    }
    #importFile { display: none; }
    #pendingBadge {
      background: var(--danger);
      color: #fff;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-left: 4px;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }

    .employees-card { padding: 0; }
    .employees-card .table-wrap { overflow-x: auto; }
    #employeesTable { width: 100%; table-layout: fixed; }
    #employeesTable .col-link { width: 200px; overflow: hidden; }
    #employeesTable .col-link .link-cell {
      display: block;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #employeesTable .col-resume {
      width: 100px;
      text-align: center;
      vertical-align: middle;
    }
    #employeesTable .col-actions {
      width: 100px;
      text-align: center;
      vertical-align: middle;
    }
    #employeesTable th.col-link,
    #employeesTable th.col-resume,
    #employeesTable th.col-actions { white-space: nowrap; }
    #employeesTable td { text-align: center; }
    #employeesTable td:first-child + td { text-align: left; }
    #employeesTable td.col-link { text-align: left; }
    #employeesTable td.col-resume { text-align: center; }
    #employeesTable td.col-actions { text-align: center; }

    .resume-dropdown {
      display: none;
      position: absolute;
      right: 0;
      top: calc(100% + 4px);
      z-index: 50;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 4px;
      min-width: 150px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .resume-dropdown.show { display: block; }
    .resume-dropdown-item {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      background: transparent;
      border: none;
      border-radius: 6px;
      padding: 8px 12px;
      font-family: inherit;
      font-size: 0.85rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
    }
    .resume-dropdown-item:hover {
      background: var(--bg-card-hover);
      color: var(--text-primary);
    }

    .action-dropdown {
      display: none;
      position: absolute;
      right: 0;
      top: calc(100% + 4px);
      z-index: 50;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 4px;
      min-width: 170px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .action-dropdown.show { display: block; }
    .action-dropdown-item {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      background: transparent;
      border: none;
      border-radius: 6px;
      padding: 8px 12px;
      font-family: inherit;
      font-size: 0.85rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
    }
    .action-dropdown-item:hover {
      background: var(--bg-card-hover);
      color: var(--text-primary);
    }
  </style>
</head>
<body class="page-wrapper">

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar-brand">
    <img src="/infosoft-dark.png" alt="ИнфоСофт" class="navbar-logo" height="65">
    <img src="/infosoft-light.png" alt="ИнфоСофт" class="navbar-logo logo-light" style="display:none;">
    <!-- <span>IS1C Портфолио</span> -->
  </div>
  <div class="navbar-actions">
    <button id="themeToggle" class="btn btn-ghost btn-sm" title="Сменить тему">🌙</button>
    <a href="/review.html" class="btn btn-warning btn-sm" id="reviewBtn">
      ⚡ Проверить изменения <span id="pendingBadge" class="hidden">0</span>
    </a>
    <a href="/settings.html" class="btn btn-ghost btn-sm">⚙ Настройки</a>
    <span id="navbarManager" style="font-size:0.75rem;color:var(--text-muted);padding:0 4px;"></span>
    <button id="logoutBtn" class="btn btn-ghost btn-sm">Выйти</button>
  </div>
</nav>

<!-- Main -->
<main class="main-content container">

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="statTotal">—</div>
      <div class="stat-label">Всего сотрудников</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--warning)" id="statPending">—</div>
      <div class="stat-label">Ожидают подтверждения</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--success)" id="statApproved">—</div>
      <div class="stat-label">Изменений подтверждено</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input id="searchInput" type="text" class="form-control" placeholder="Поиск по ФИО или должности..." style="width:320px">
      </div>
      <select id="filterPosition" class="form-control" style="width:auto;min-width:200px;">
        <option value="">— Все должности —</option>
      </select>
      <label class="filter-label">
        <input type="checkbox" id="filterArchived" checked> Показывать архив
      </label>
    </div>
    <button id="addEmployeeBtn" class="btn btn-primary btn-sm">➕ Сотрудника</button>
    <a href="/api/excel/export" class="btn btn-ghost btn-sm">📤 Экспорт Excel</a>
  </div>

  <!-- Toolbar -->
  <div class="toolbar" id="exportToolbar" style="display:none;">
    <div class="toolbar-left">
      <span id="selectedCount" style="font-size:0.82rem;color:var(--text-secondary);font-weight:600;"></span>
      <button class="btn btn-primary btn-sm" id="exportExcelBtn">📊 Excel</button>
      <button class="btn btn-primary btn-sm" id="exportDocxBtn">📄 DOCX</button>
      <button class="btn btn-primary btn-sm" id="exportPdfBtn">📑 PDF</button>
      <button class="btn btn-ghost btn-sm" id="clearSelectionBtn">✕ Снять выделение</button>
    </div>
  </div>

  <!-- Table -->
  <div class="card employees-card">
    <div class="table-wrap">
      <table class="table" id="employeesTable">
        <thead>
          <tr>
            <th class="col-check"><input type="checkbox" id="selectAll"></th>
            <th>Сотрудник</th>
            <th>Должность</th>
            <th>Город</th>
            <th>Статус</th>
            <th class="col-date">Дата актуализации</th>
            <th class="col-link">Персональная ссылка</th>
            <th class="col-resume">Резюме</th>
            <th class="col-actions">Действия</th>
          </tr>
        </thead>
        <tbody id="employeesTbody">
          <tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-muted)">
            <span class="spinner"></span>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- Add Employee Modal -->
<div class="modal-overlay" id="addEmployeeModal">
  <div class="modal" style="max-width:560px;">
    <div class="modal-header">
      <span class="modal-title">➕ Новый сотрудник</span>
      <button class="btn btn-ghost btn-icon" id="closeAddModal">✕</button>
    </div>
    <form id="addEmployeeForm">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">ФИО <span class="required">*</span></label>
          <input type="text" class="form-control" id="new_name" placeholder="Иванов Иван Иванович" required>
        </div>
        <div class="form-group">
          <label class="form-label">Должность</label>
          <select class="form-control" id="new_position"></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="new_email" placeholder="ivanov@company.ru">
        </div>
        <div class="form-group">
          <label class="form-label">Город</label>
          <input type="text" class="form-control" id="new_city" placeholder="Москва">
        </div>
      </div>
      <div id="addResult" style="margin-bottom:12px;"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button type="button" class="btn btn-ghost" id="cancelAdd">Отмена</button>
        <button type="submit" class="btn btn-primary" id="saveNewBtn">➕ Добавить и скопировать ссылку</button>
      </div>
    </form>
  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script src="/js/manager.js"></script>
</body>
</html>

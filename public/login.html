<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Вход — Портфолио IS1C</title>
  <meta name="description" content="Вход в систему управления портфолио сотрудников IS1C">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
</head>
<body>
<div class="login-page">
  <div class="login-card fade-in">
    <div class="login-logo">
      <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;">
        <img src="/infosoft-dark.png" alt="ИнфоСофт" class="logo-dark" style="height: 70px; width: auto;">
        <img src="/infosoft-light.png" alt="ИнфоСофт" class="logo-light" style="height: 85px; width: auto;">
        <!-- <h1 style="margin:0;">IS1C Портфолио</h1> -->
      </div>
      <p>Система управления портфолио сотрудников</p>
    </div>
    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label class="form-label" for="login">Логин</label>
        <input
          id="login"
          name="login"
          type="text"
          class="form-control"
          placeholder="admin"
          autocomplete="username"
          required
        >
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Пароль</label>
        <input
          id="password"
          name="password"
          type="password"
          class="form-control"
          placeholder="Введите пароль"
          autocomplete="current-password"
          required
        >
      </div>

      <div id="errorMsg" class="hidden"
           style="background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);
                  color:#ef4444;padding:10px 14px;border-radius:8px;font-size:0.875rem;margin-bottom:16px;">
      </div>

      <button id="loginBtn" type="submit" class="btn btn-primary w-full btn-lg">
        Войти в систему
      </button>

      <p class="text-xs text-muted" style="text-align:center;margin-top:20px;line-height:1.5;">
        Первый вход: <strong style="color:var(--text-secondary);">admin</strong> / <strong style="color:var(--text-secondary);">Admin1234!</strong><br>
        Смените пароль в настройках после входа.
      </p>
    </form>
    <div style="text-align:center;margin-top:16px;">
      <button id="themeToggleLogin" class="btn btn-ghost btn-sm" title="Сменить тему"><i class="fi fi-rr-moon"></i></button>
    </div>
  </div>
</div>

<script>
// Theme
(function() {
  const saved = localStorage.getItem('theme') || 'dark';
  if (saved === 'light') { document.body.classList.add('light-theme'); }
  document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('themeToggleLogin');
    if (btn) {
      if (saved === 'light') btn.innerHTML = '<i class="fi fi-rr-sun"></i>';
      btn.addEventListener('click', () => {
        document.body.classList.toggle('light-theme');
        const isLight = document.body.classList.contains('light-theme');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        btn.innerHTML = isLight ? '<i class="fi fi-rr-sun"></i>' : '<i class="fi fi-rr-moon"></i>';
      });
    }
  });
})();

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');
  const login = document.getElementById('login').value;
  const password = document.getElementById('password').value;

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Вход...';
  err.classList.add('hidden');

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ login, password }),
    });
    const data = await res.json();

    if (res.ok) {
      window.location.href = '/index.html';
    } else {
      err.textContent = data.error || 'Неверный email или пароль';
      err.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Войти в систему';
    }
  } catch {
    err.textContent = 'Ошибка соединения с сервером';
    err.classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = 'Войти в систему';
  }
});
</script>
</body>
</html>

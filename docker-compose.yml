services:
  # PostgreSQL база данных
  postgres:
    image: postgres:15
    container_name: portfolio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio_password
      POSTGRES_DB: portfolio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Тестовый Active Directory (Samba AD DC) — заменяет VirtualBox-ВМ для демо
  samba-ad:
    image: nowsci/samba-domain
    container_name: samba-ad
    restart: unless-stopped
    privileged: true
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
      - DAC_OVERRIDE
    environment:
      DOMAIN: TEST.LOCAL
      DOMAINPASS: "YourStr0ngP@ss!"
      DNS_FORWARDER: 8.8.8.8
      INSECURE: "true"
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - samba_data:/var/lib/samba
      - samba_config:/etc/samba/external
    networks:
      - portfolio-network

  # Ваш Node.js сервер
  app:
    build: .
    container_name: portfolio-app
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Подключение к PostgreSQL — по имени сервиса "postgres" внутри Docker-сети,
      # а не "localhost". Именно эти переменные читает config.js.
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DATABASE=portfolio
      - PG_USER=portfolio
      - PG_PASSWORD=portfolio_password
      # Active Directory — теперь тоже внутри Docker-сети, имя сервиса "samba-ad"
      - AD_ENABLED=true
      - AD_URL=ldaps://samba-ad:636
      - AD_DOMAIN=test.local
      - AD_ADMIN_GROUP=HR_Managers
      - AD_DEFAULT_ROLE=scrum
    depends_on:
      postgres:
        condition: service_healthy
      samba-ad:
        condition: service_started
    shm_size: "1gb"
    tmpfs:
      - /tmp
    restart: unless-stopped
    networks:
      - portfolio-network

volumes:
  postgres_data:
  samba_data:
  samba_config:

networks:
  portfolio-network:
    driver: bridge
